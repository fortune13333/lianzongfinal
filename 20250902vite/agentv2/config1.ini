# 链踪本地代理配置文件 (ChainTrace Local Agent Configuration)
#
# ⭐ 重要提示 (IMPORTANT NOTE) ⭐
# 编辑和保存此文件时，请务务必使用 "UTF-8" 编码，否则包含中文字符的注释可能会导致程序启动失败！
# When editing and saving this file, you MUST use "UTF-8" encoding, otherwise comments with 
# Chinese characters may cause the program to fail on startup!

[server]
# (可选) 配置代理服务监听的IP地址和端口。
# (Optional) Configure the IP address and port for the agent service to listen on.
host = 127.0.0.1
port = 8001

# --- 后端AI引擎配置 (Backend AI Engine Configuration) ---
[ai_provider]
# (必需) 在此选择后端用于“合规审计”和“智能分析”的AI驱动。
# (Required) Select the backend AI driver for "Compliance Auditing" and "Smart Analysis".
#
# 可选项 (Options):
#   - gemini: 直接调用 Google Gemini API。需要配置下面的 'gemini_api_key'。
#   - http:   调用一个符合“链踪”API合约的、自定义的HTTP(S)接口。
#             适用于接入公司自研模型、第三方模型（如DeepSeek, Kimi）的适配器。
#             需要配置下面的 'http_api_...' 相关选项。
driver = gemini

# --- Gemini 驱动配置 ---
# 仅在 driver = gemini 时生效。
gemini_api_key = AIzaSyCwVd3milO-Dxy9sA0Lc1_Drlz_ndB7wjE

# --- HTTP 驱动配置 ---
# 仅在 driver = http 时生效。
# 您的适配器服务的基础URL。
http_api_base_url = http://127.0.0.1:9000
# “智能分析”功能的路径。
http_analysis_path = /analyze
# “合规审计”功能的路径。
http_audit_path = /audit
# (可选) 如果您的适配器服务需要认证，请在此填入API密钥 (将作为 Bearer Token 发送)。
http_api_key = sk-your-custom-api-key


# --- 多凭证配置区 (Multiple Credentials Sections) ---
# 您可以定义多个凭证区段，每个区段对应一套登录信息。
# 区段名称可以自定义，但建议以 "credentials_" 开头以便于识别。
# You can define multiple credential sections, each for a different set of login info.
# Section names are customizable, but starting them with "credentials_" is recommended for clarity.

[credentials_default_cisco]
# (必需) 用于通过SSH登录网络设备的凭据。
# (Required) Credentials for logging into network devices via SSH.
username = admin
password = cisco
# secret = your_enable_password  ; (可选) 如果您的设备需要'enable'密码，请取消此行的注释并填写。 / (Optional) Uncomment and fill this if your device requires an 'enable' password.
[ciscoR1]
# (必需) 用于通过SSH登录网络设备的凭据。
# (Required) Credentials for logging into network devices via SSH.
username = admin
password = cisco123
# secret = your_enable_password  ; (可选) 如果您的设备需要'enable'密码，请取消此行的注释并填写。 / (Optional) Uncomment and fill this if your device requires an 'enable' password.

[ciscoSW1]
# (必需) 用于通过SSH登录网络设备的凭据。
# (Required) Credentials for logging into network devices via SSH.
username = admin
password = cisco123

[credentials_lab_h3c]
username = lab_user
password = h3c_password

# ⭐ 如何使用模拟模式？(How to use Simulation Mode?) ⭐
# 如果您想在没有真实硬件的情况下测试应用，只需将任意一个凭证区段的用户名设置为 SIM_USER。
# To test the application without real hardware, simply set the username in ANY credentials section to SIM_USER.
# 例 (e.g.): 
# [credentials_simulation]
# username = SIM_USER
# password = any

# --- 实时命令拦截规则库 (Real-time Command Interception Rules) ---
# 这是“链踪”的第一道实时防线。在此定义的规则将在用户于交互式终端按下回车时立即生效，
# 阻止不合规或危险的命令被发送到设备。
# This is the first line of real-time defense for ChainTrace. Rules defined here will take effect
# immediately when a user presses Enter in the interactive console, blocking non-compliant or
# dangerous commands from being sent to the device.
[interception_rules]
#
# --- 使用说明 (Instructions) ---
# 格式 (Format): 
#   规则名称 = 类型: 关键字1, 关键字2, ...
#   rule_name = type: keyword1, keyword2, ...
#
# 规则名称 (rule_name):
#   一个您自定义的、用于描述规则目的的名称 (如 block_telnet)。
#   A custom name you define to describe the rule's purpose (e.g., block_telnet).
#
# 支持的类型 (Supported Types):
#   1. contains
#      - 只要用户输入的命令中【包含】任意一个指定的关键字，就会被拦截。
#      - Intercepts if the user's command CONTAINS any of the specified keywords.
#      - 技巧: 为避免误报 (如 'show ip' 包含 'ip')，关键字应尽可能精确 (如 'ip address ')。
#      - Tip: To avoid false positives (e.g., 'show ip' contains 'ip'), make keywords as specific as possible (e.g., 'ip address ').
#
#   2. startswith
#      - 只要用户输入的命令【以】任意一个指定的关键字开头，就会被拦截。
#      - Intercepts if the user's command STARTS WITH any of the specified keywords.
#      - 适用于拦截一整类命令，如 'copy', 'erase', 'reload'。
#      - Ideal for blocking entire command categories like 'copy', 'erase', 'reload'.
#
#   3. regex
#      - 使用【正则表达式】来匹配命令。这是最强大和灵活的方式。
#      - Uses a regular expression to match the command. This is the most powerful and flexible method.
#      - 注意: 请确保您的正则表达式语法正确，否则代理启动时会报错。
#      - Note: Ensure your regex syntax is correct, or the agent will fail to start.
#
# --- 规则示例 (Examples) ---

# 规则1: 阻止所有与telnet相关的命令。
# Rule 1: Block all commands related to telnet.
block_telnet = contains: telnet

# 规则2: 阻止所有尝试配置SNMP community字符串的命令，这是一个常见的安全风险。
# Rule 2: Block any attempt to configure an SNMP community string, a common security risk.
block_snmp_community = contains: snmp-server community

# 规则3: 阻止所有危险的文件系统操作和设备重载命令。
# Rule 3: Block all dangerous filesystem operations and device reload commands.
block_destructive_ops = startswith: copy, erase, delete, format, reload

# 规则4: 阻止为特定管理子网 (10.0.1.x) 配置IP地址。
# Rule 4: Block IP address configuration for a specific management subnet (10.0.1.x).
# block_mgmt_subnet_ip = regex: ip address 10\.0\.1\.\d+

# 规则5: 阻止保存配置的命令，强制所有保存操作都通过“保存并审计”按钮完成。
# Rule 5: Block commands that save the configuration, forcing all saves through the "Save & Audit" button.
block_manual_save = startswith: write memory, wr, save

[device_map]
# (必需) 将Web应用中的设备ID映射到真实设备的IP地址、Netmiko设备类型和所使用的凭证区段。
# (Required) Map the Device ID from the web app to the device's IP, Netmiko type, and the credentials section to use.
#
# 格式 (Format): 
# WEB应用中的设备ID = IP地址, Netmiko设备类型, [凭证区段名称]
# DeviceID_in_WebApp = IP_Address, Netmiko_Device_Type, [Credentials_Section_Name]
#
# 完整的Netmiko支持类型列表见 (For a full list of supported Netmiko types, see):
# https://github.com/ktbyers/netmiko/blob/develop/README.md#supports
#
# 示例 (Examples):
RTR01-NYC = 192.168.1.1, cisco_ios, credentials_default_cisco
SW01-SFO = 10.10.5.254, cisco_ios, credentials_default_cisco
FW01-LON = 203.0.113.1, cisco_asa, credentials_default_cisco

# 在此行下方添加您的新设备 (Add your new devices below this line)
# CORE-SW-BEIJING = 10.0.0.1, huawei_vrp, credentials_lab_h3c
H3C = 192.168.1.25, hp_comware, credentials_lab_h3c
CISCOR1 = 192.168.234.25, cisco_ios, ciscoR1
CISCOSW1 = 192.168.40.131, cisco_ios, ciscoSW1