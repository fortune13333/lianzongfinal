# 链踪本地代理配置文件 (ChainTrace Local Agent Configuration)
#
# ⭐ 重要提示 (IMPORTANT NOTE) ⭐
# 编辑和保存此文件时，请务务必使用 "UTF-8" 编码，否则包含中文字符的注释可能会导致程序启动失败！
# When editing and saving this file, you MUST use "UTF-8" encoding, otherwise comments with 
# Chinese characters may cause the program to fail on startup!

[server]
# (可选) 配置代理服务监听的IP地址和端口。
# (Optional) Configure the IP address and port for the agent service to listen on.
host = 127.0.0.1
port = 8001

# --- 后端AI引擎配置 (Backend AI Engine Configuration) ---
[ai_provider]
# (必需) 在此选择后端用于所有AI任务的驱动。
# (Required) Select the backend AI driver for all AI tasks.
#
# 可选项 (Options):
#   - gemini: 直接调用 Google Gemini API。
#   - http:   调用一个符合“链踪”API合约的、自定义的HTTP(S)接口。
#   - spark:  调用讯飞星火认知大模型 (通过其OpenAI兼容接口)。
driver = spark

# --- Gemini 驱动配置 ---
# 仅在 driver = gemini 时生效。
gemini_api_key = AIzaSyCwVd3milO-Dxy9sA0Lc1_Drlz_ndB7wjE

# --- HTTP 驱动配置 ---
# 仅在 driver = http 时生效。
http_api_base_url = http://127.0.0.1:9000
http_analysis_path = /analyze
http_audit_path = /audit
http_command_generation_path = /generate-command
http_config_check_path = /check-config
http_api_key = sk-your-custom-api-key

# --- (重要) 星火大模型驱动配置 ---
# 仅在 driver = spark 时生效。
[spark]
# (必需) 请从讯飞星火控制台的【Websocket服务接口认证信息】区域，获取您的 APPID。
# !! 警告 !!: 此值【不是】数字1或占位符，而是一个类似 'ab2da882' 的字符串。
app_id = ab2da882

# (必需) 请从讯飞星火控制台的【http 服务接口认证信息】区域，获取您的 APIPassword。
# 这是一个单独的、完整的密钥字符串，请直接复制粘贴。
# !! 警告 !!: 此值【不是】来自【Websocket服务】的 APIKey 和 APISecret 的组合。
http_api_password = nYgbyJaVFYSryvJjrlyp:CIxwowBWVLrzOFglTcjR

# (必需) 指定用于所有AI任务的统一模型。
# 注意：此处的模型名称必须是您的账户有权访问的、星火OpenAI兼容接口支持的名称。
# 常用选项: 'generalv3.5' (Max版), 'generalv3' (Pro版)。
model = generalv3.5


# --- 多凭证配置区 (Multiple Credentials Sections) ---
# 您可以定义多个凭证区段，每个区段对应一套登录信息。
# 区段名称可以自定义，但建议以 "credentials_" 开头以便于识别。
# You can define multiple credential sections, each for a different set of login info.
# Section names are customizable, but starting them with "credentials_" is recommended for clarity.

[credentials_default_cisco]
# (必需) 用于通过SSH登录网络设备的凭据。
# (Required) Credentials for logging into network devices via SSH.
username = SIM_USER
password = cisco
# secret = your_enable_password  ; (可选) 如果您的设备需要'enable'密码，请取消此行的注释并填写。 / (Optional) Uncomment and fill this if your device requires an 'enable' password.
[ciscoR1]
# (必需) 用于通过SSH登录网络设备的凭据。
# (Required) Credentials for logging into network devices via SSH.
username = admin
password = cisco123
# secret = your_enable_password  ; (可选) 如果您的设备需要'enable'密码，请取消此行的注释并填写。 / (Optional) Uncomment and fill this if your device requires an 'enable' password.

[ciscoSW1]
# (必需) 用于通过SSH登录网络设备的凭据。
# (Required) Credentials for logging into network devices via SSH.
username = admin
password = cisco123

[credentials_lab_h3c]
