name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Backend Python tests
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend (Python pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('agentv2/requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies
        run: pip install -r agentv2/requirements.txt pytest pytest-asyncio httpx

      - name: Run backend tests
        working-directory: agentv2
        env:
          # Use a fixed test secret so JWT tokens are stable across test runs
          CT_JWT_SECRET_KEY: ci-test-secret-not-for-production
        run: python -m pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Job 2: Frontend tests + build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Vitest + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # Job 3: Docker build check (no push)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t chaintrace:ci .
