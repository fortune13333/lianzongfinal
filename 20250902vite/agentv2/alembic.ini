# alembic.ini - Alembic database migration configuration for ChainTrace

[alembic]
script_location = alembic
prepend_sys_path = .

# Template for migration file names. %(rev)s = revision hash, %(slug)s = short description
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamp in migration filenames
timezone = UTC

# Log level for Alembic
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
